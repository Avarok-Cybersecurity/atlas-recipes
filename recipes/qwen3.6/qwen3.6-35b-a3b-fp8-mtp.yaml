recipe_version: "2"
model: Qwen/Qwen3.6-35B-A3B-FP8
runtime: atlas
container: avarok/atlas-gb10:latest
max_nodes: 1

metadata:
  description: |
    Qwen3.6-35B-A3B (qwen3_5_moe architecture) at native FP8 on the
    Atlas runtime, with the upstream-bundled MTP draft head enabled for
    K=2 speculative decoding. A3B MoE attention (not dense) so FP8 KV is
    stable here — mirrors qwen3.6-35b-a3b-nvfp4-atlas but serves the FP8
    checkpoint with no NVFP4 conversion overhead. Single GB10.
  maintainer: avarok
  category: agent
  model_params: 35B
  model_dtype: fp8
  quantization: fp8
  kv_dtype: fp8

defaults:
  port: 8888
  host: 0.0.0.0
  # Default was 131072, which provisions a huge KV pool and leaves no
  # headroom at depth on a single GB10. 16384 is a single-GB10-serviceable
  # context that still covers the deep (depth-8192) prompts users run.
  # NOTE: do NOT cap max_batch_size here. The SSM state pool is sized to
  # max_batch_size (impl_a1.rs), and shrinking it triggers a slot-leak that
  # bricks the server on the first aborted deep prefill. Concurrency>=4 with
  # deep context is a separate Atlas runtime crash, tracked in
  # Avarok-Cybersecurity/atlas#110 — not fixable from the recipe.
  max_model_len: 16384
  kv_cache_dtype: fp8
  kv_high_precision_layers: auto
  gpu_memory_utilization: 0.88
  scheduling_policy: slai
  speculative: true
  mtp_quantization: bf16
  enable_prefix_caching: true
  oom_guard_mb: 1024

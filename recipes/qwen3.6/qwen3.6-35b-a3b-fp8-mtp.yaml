recipe_version: "2"
model: Qwen/Qwen3.6-35B-A3B-FP8
runtime: atlas
container: avarok/atlas-gb10:latest
max_nodes: 1

metadata:
  description: |
    Qwen3.6-35B-A3B (qwen3_5_moe architecture) at native FP8 on the
    Atlas runtime, with the upstream-bundled MTP draft head enabled for
    K=2 speculative decoding. A3B MoE attention (not dense) so FP8 KV is
    stable here — mirrors qwen3.6-35b-a3b-nvfp4-atlas but serves the FP8
    checkpoint with no NVFP4 conversion overhead. Single GB10.
  maintainer: avarok
  category: agent
  model_params: 35B
  model_dtype: fp8
  quantization: fp8
  kv_dtype: fp8

defaults:
  port: 8888
  host: 0.0.0.0
  # max_model_len was 131072 with no batch cap, so Atlas provisioned the
  # KV pool for 131072 x default-batch-8 tokens. On a single GB10 that
  # overcommits the post-weights GPU slice at gpu_memory_utilization 0.88:
  # single-thread requests work, but concurrency 2-4 and any request at
  # depth 8192 push live KV allocation past the pool and the server
  # crashes (0 tok/s). Cap context to a single-GB10-serviceable length
  # and bound the batch so concurrency 2-4 admits cleanly.
  max_model_len: 16384
  max_batch_size: 4
  max_num_seqs: 4
  kv_cache_dtype: fp8
  kv_high_precision_layers: auto
  gpu_memory_utilization: 0.88
  scheduling_policy: slai
  speculative: true
  mtp_quantization: bf16
  enable_prefix_caching: true
  oom_guard_mb: 1024

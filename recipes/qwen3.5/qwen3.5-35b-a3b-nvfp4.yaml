recipe_version: "2"
model: Sehyo/Qwen3.5-35B-A3B-NVFP4
runtime: atlas
container: avarok/atlas-gb10:latest
max_nodes: 1

metadata:
  description: |
    Qwen3.5-35B (A3B MoE) NVFP4 + MTP — Atlas's fastest catalogued model
    on a single GB10 (~133 tok/s decode at concurrency=1, ISL=128, OSL=128
    per the avarok/atlas-gb10 QUICKSTART).
  maintainer: avarok
  category: agent
  model_params: 35B
  model_dtype: nvfp4
  quantization: nvfp4
  kv_dtype: fp8

defaults:
  port: 8888
  host: 0.0.0.0
  max_model_len: 8192
  # Cap concurrent decode batch. Without this Atlas defaults to
  # max_batch_size=8, and the inference-buffer + SSM-pool + GDN
  # chunked-prefill preallocation scales with max_seq_len x batch
  # (8192 x 8), needing ~9.35 GB before weights load — more than the
  # free GPU slice at gpu_memory_utilization 0.88, so `sparkrun run
  # @atlas/qwen3.5-35b-a3b-nvfp4` fails preflight out of the box.
  # 8192 x 2 keeps the full context while fitting the budget.
  max_batch_size: 2
  max_num_seqs: 2
  kv_cache_dtype: fp8
  gpu_memory_utilization: 0.88
  scheduling_policy: slai
  speculative: true
  mtp_quantization: bf16
  enable_prefix_caching: true
  oom_guard_mb: 1024
